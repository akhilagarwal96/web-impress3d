name: Deploy to Firebase Hosting on Merge
on:
  push:
    branches:
      - main
    # The action will skip if the ONLY changes are in these paths
    paths-ignore:
      - 'images/**'
      - 'README.md'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_IMPRESS3D }}'
          channelId: live
          projectId: impress3d-e0ec5
